<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bus-X</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet"/>
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
  </head>
  <body>
    <header class="container mt-4">
      <div class="navbar">
        <h1 class="fs-3 fw-bold">Bus-X</h1>
        <div>
          <button class="btn">Live</button>
          <button class="btn">Schedule</button>
          <button class="btn">Routes</button>
        </div>
      </div>
      <hr class="mt-3 mb-3">
      <p class="text-start mt-5">Welcome back — here is your real-time ride status</p>
    </header>
    <div class="container">
      <div class="row">
        <div class="col-md-6">
          <div class="card">
            <div class="card-body">
              <h5 class="card-title">Bus Availability</h5>
              <p class="card-text">Check the availability of buses in real-time.</p>
              <div id="availability"></div>
              <div class="text-center">
                <div class="border border-warning solid rounded p-2 d-inline-block">
                  <div class="d-flex gap-2 mb-1">
                    <i class="bi bi-app fs-3"></i>
                    <i class="bi bi-app fs-3 me-4"></i>
                    <i class="bi bi-app fs-3"></i>
                    <i class="bi bi-app fs-3"></i>
                  </div>
                  <div class="d-flex gap-2">
                    <i class="bi bi-app fs-3"></i>
                    <i class="bi bi-app fs-3 me-4"></i>
                    <i class="bi bi-app fs-3"></i>
                    <i class="bi bi-app fs-3"></i>
                  </div>
                  <div class="d-flex gap-2">
                    <i class="bi bi-app fs-3"></i>
                    <i class="bi bi-app fs-3 me-4"></i>
                    <i class="bi bi-app fs-3"></i>
                    <i class="bi bi-app fs-3"></i>
                  </div>
                  <div class="d-flex gap-2">
                    <i class="bi bi-app fs-3"></i>
                    <i class="bi bi-app fs-3 me-4"></i>
                    <i class="bi bi-app fs-3"></i>
                    <i class="bi bi-app fs-3"></i>
                  </div>                  
                  <div class="d-flex gap-2">
                    <i class="bi bi-app fs-3"></i>
                    <i class="bi bi-app fs-3 me-4"></i>
                    <i class="bi bi-app fs-3"></i>
                    <i class="bi bi-app fs-3"></i>
                  </div>                  
                  <div class="d-flex gap-2">
                    <i class="bi bi-app fs-3"></i>
                    <i class="bi bi-app fs-3 me-4"></i>
                    <i class="bi bi-app fs-3"></i>
                    <i class="bi bi-app fs-3"></i>
                  </div>                  
                  <div class="d-flex gap-2">
                    <i class="bi bi-app fs-3"></i>
                    <i class="bi bi-app fs-3 me-4"></i>
                    <i class="bi bi-app fs-3"></i>
                    <i class="bi bi-app fs-3"></i>
                  </div>                  
                  <div class="d-flex gap-2">
                    <i class="bi bi-app fs-3"></i>
                    <i class="bi bi-app fs-3 me-4"></i>
                    <i class="bi bi-app fs-3"></i>
                    <i class="bi bi-app fs-3"></i>
                  </div>                  
                  <div class="d-flex gap-2">
                    <i class="bi bi-app fs-3"></i>
                    <i class="bi bi-app fs-3 me-4"></i>
                    <i class="bi bi-app fs-3"></i>
                    <i class="bi bi-app fs-3"></i>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="card">
            <div class="card-body">
              <h5 class="card-title">Estimated wait time</h5>
              <p class="card-text">How long will you have to wait for the next bus?</p>

              <div id="wait-time">

              </div>
            </div>
          </div>
          <div class="">
            <div id="map" style="width:100%; height:400px;"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="container mt-5 mb-5">
      <div id="alert">
        </div>
      <div class="row text-center">
  
        <div class="col-8 border rounded p-3 solid">
            <h5 class="card-title">Book Your Seat</h5>
            <input type="text" id="seats" class="form-control mt-1 mb-2" placeholder="Which seat would you like to book?">
            <h5 class="card-text">Available seats: <span id="available-seats"></span></h5>
            <button class="btn btn-primary mt-3" type="button">Book Now</button>
        </div>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>

    <style>

    </style>
  </body>
</html>
